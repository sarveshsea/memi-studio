name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.18.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-sign:
    name: Build, sign, notarize (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install npm dependencies
        run: npm ci

      - name: Fetch sidecar binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run fetch:runtime -- --all-archs

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE_BASE64" | base64 -D -o cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f cert.p12

      - name: Build, sign, notarize Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" -print -quit)
          if [ -z "$DMG" ]; then
            echo "no DMG found under src-tauri/target/${{ matrix.target }}/release/bundle/dmg"
            exit 1
          fi
          echo "submitting $DMG to notarytool (synchronous, will wait for verdict)..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > notarize-result.json
          cat notarize-result.json
          STATUS=$(node -e "console.log(require('./notarize-result.json').status)")
          if [ "$STATUS" != "Accepted" ]; then
            SUBMISSION_ID=$(node -e "console.log(require('./notarize-result.json').id)")
            echo "notarization failed (status=$STATUS) — fetching log for submission $SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" || true
            exit 1
          fi
          echo "stapling notarization ticket to $DMG"
          xcrun stapler staple "$DMG"
          echo "stapled successfully"

      - name: Verify Gatekeeper assessment
        run: |
          set -euo pipefail
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" -print -quit)
          spctl -a -vv --type install "$DMG" || (echo "spctl assessment failed for $DMG"; exit 1)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memi-studio-${{ matrix.arch }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: build-and-sign
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download all DMG artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute checksums
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -name "*.dmg" -exec mv {} release/ \;
          cd release
          shasum -a 256 *.dmg > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "memi-studio $TAG" \
            --generate-notes \
            release/*.dmg release/SHA256SUMS
