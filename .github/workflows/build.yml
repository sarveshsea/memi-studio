name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  license-check:
    name: SPDX header check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run license:check

  product-hygiene:
    name: Product hygiene gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Fetch runtime resources for hygiene checks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run fetch:runtime -- --all-archs
      - run: npm run test:no-mock-ui
      - run: npm run test:no-empty-catch
      - run: npm run test:unit
      - run: npm run test:workbench-context
      - run: npm run test:runtime-fetch

  build-macos:
    name: Build macOS (${{ matrix.target }})
    needs:
      - license-check
      - product-hygiene
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/Library/Caches/cv.memoire.studio/cargo-target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Fetch sidecar binaries from engine releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run fetch:runtime -- --all-archs

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.target }}

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: memi-studio-${{ matrix.arch }}
          path: |
            ~/Library/Caches/cv.memoire.studio/cargo-target/${{ matrix.target }}/release/bundle/macos/*.app
            ~/Library/Caches/cv.memoire.studio/cargo-target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14
